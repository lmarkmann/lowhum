name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - uses: extractions/setup-just@v2

      - run: uv sync

      - run: just archive

      - name: Compute sha256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/LowHum-*-macOS-arm64.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "**sha256:** \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')
          gh release create "$TAG" \
            dist/LowHum-*-macOS-arm64.zip \
            --title "LowHum $TAG" \
            --generate-notes
