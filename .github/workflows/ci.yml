name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff format --check src/
      - run: uv run ruff check src/
      - run: uv run mypy src/
      - run: uv run pytest tests/ -q || echo "no tests yet"
